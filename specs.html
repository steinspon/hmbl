<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Himmelblå – Specifications & User Manuals</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Himmelblå">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link id="apple-touch-icon" rel="apple-touch-icon" href="logo.png">
  <link id="favicon-icon" rel="icon" href="logo.png">

  <style>
    :root {
      --bg: #eef3f7;
      --card: rgba(255, 255, 255, 0.9);
      --text: #18324a;
      --muted: #58718a;
      --accent: #2c5f87;
      --accent-2: #6fa8dc;
      --border: rgba(44, 95, 135, 0.12);
      --shadow: 0 10px 30px rgba(24, 50, 74, 0.10);
      --radius: 20px;

      --bg-top: rgba(111, 168, 220, 0.18);
      --bg-grad-top: #f7fbff;
      --bg-grad-bottom: var(--bg);

      --logo-wrap-bg: rgba(255,255,255,0.65);
      --logo-wrap-border: rgba(255,255,255,0.65);

      --back-bg: rgba(255,255,255,0.8);
      --back-border: rgba(44, 95, 135, 0.14);

      --manual-bg-top: #2f6f9f;
      --manual-bg-bottom: #25577d;
      --manual-shadow: 0 6px 16px rgba(44, 95, 135, 0.14);

      --image-shadow: 0 6px 18px rgba(24, 50, 74, 0.10);
      --map-link: #2c5f87;
    }

    html[data-theme="dark"] {
      --bg: #0a1220;
      --card: rgba(20, 31, 48, 0.9);
      --text: #e7eef8;
      --muted: #9fb0c7;
      --accent: #6de3b0;
      --accent-2: #4eb7ff;
      --border: rgba(170, 190, 220, 0.10);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);

      --bg-top: rgba(80, 220, 170, 0.14);
      --bg-grad-top: #0f1b2b;
      --bg-grad-bottom: #09111d;

      --logo-wrap-bg: rgba(255,255,255,0.04);
      --logo-wrap-border: rgba(255,255,255,0.06);

      --back-bg: rgba(255,255,255,0.04);
      --back-border: rgba(109, 227, 176, 0.15);

      --manual-bg-top: #26415b;
      --manual-bg-bottom: #1b2f44;
      --manual-shadow: 0 6px 16px rgba(0,0,0,0.24);

      --image-shadow: 0 6px 18px rgba(0,0,0,0.22);
      --map-link: #6de3b0;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, var(--bg-top), transparent 35%),
        linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bottom) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .header {
      margin-bottom: 18px;
    }

    .logo-wrap {
      background: var(--logo-wrap-bg);
      border: 1px solid var(--logo-wrap-border);
      border-radius: 24px;
      padding: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
    }

    .page-title {
      margin: 18px 4px 6px;
      font-size: 1.75rem;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .page-subtitle {
      margin: 0 10px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .page-subtitle a {
      color: var(--map-link);
      font-weight: 600;
      text-decoration: none;
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card-title {
      margin: 0 0 8px;
      font-size: 1.25rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .card-desc {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .image-gallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 14px;
      scroll-snap-type: x proximity;
    }

    .image-gallery::-webkit-scrollbar {
      display: none;
    }

    .card-image {
      flex: 0 0 auto;
      width: 80%;
      max-width: 280px;
      display: block;
      border-radius: 14px;
      box-shadow: var(--image-shadow);
      scroll-snap-align: start;
      cursor: pointer;
      transition: box-shadow 0.3s ease;
    }

    .manual-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .manual-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      background: linear-gradient(180deg, var(--manual-bg-top) 0%, var(--manual-bg-bottom) 100%);
      color: white;
      box-shadow: var(--manual-shadow);
      transition: transform 0.06s ease, box-shadow 0.15s ease, opacity 0.15s ease, background 0.3s ease;
    }

    .manual-link:active {
      transform: scale(0.985);
    }

    .back-row {
      margin-top: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      background: var(--back-bg);
      color: var(--accent);
      border: 1px solid var(--back-border);
      box-shadow: var(--shadow);
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .empty-note {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      color: var(--muted);
      text-align: center;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    @media (min-width: 700px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="logo-wrap">
        <img id="main-logo" src="logo.png" alt="Himmelblå logo" class="logo">
      </div>
      <h1 class="page-title">Technical Reference</h1>
      <p class="page-subtitle">
        Måssårabben 3
        <br>2550 Os i Østerdalen
        <br>-
        <br><a href="https://ut.no/kart#17/62.47479/11.224522" target="_blank" rel="noopener noreferrer">Open map (UT.no)</a>
        <br>-
        <br>Areal (BRA/P-ROM): 72/66 kvm
        <br>Byggeår: 2002
        <br>807 moh.
      </p>
    </header>

    <section id="cards" class="cards"></section>

    <div class="back-row">
      <a class="back-link" href="index.html">Back</a>
    </div>
  </main>

  <script>
    const entries = [
      {
        title: "Sauna Oven",
        description: "Main sauna heater. Add model details: <br>E.g., serial number, power rating, or any operating notes here.",
        images: [
          "images/sauna_1.jpg",
          "images/sauna_2.jpg"
        ],
        manuals: [
          {
            href: "files/sauna.pdf",
            label: "User Manual"
          }
        ]
      },
      {
        title: "Electricity Cupboard",
        description: "230V / 40A",
        images: [
          "images/Sikring_0.jpg",
          "images/Sikring_1.jpg",
          "images/Sikring_2.jpg",
          "images/Sikring_3.jpg",
          "images/Sikring_4.jpg"
        ],
        manuals: []
      },
      {
        title: "Paint, Kitchen",
        description: "Dark grey colour, kitchen and kitchen furniture.",
        images: [
          "images/paint_kitchen_1.jpg",
          "images/paint_kitchen_2.jpg"
        ],
        manuals: []
      },
           {
        title: "Hoover",
        description: "Bosch BSGL5S3055 <br><a href='https://www.bosch-home.no/no/product/BSGL5S3055' target='_blank' rel='noopener noreferrer'>Bosch Website</a>",
        images: [
          "images/hoover_1.jpg",
          "images/hoover_2.jpg"
        ],
        manuals: [
          {
            href: "files/hoover.pdf",
            label: "User Manual"
          }
        ]
      },
      {
        title: "Heat Pump",
        description: "Wilfa Nordkapp 40W.<br>7 year warranty<br>Installed May 2025",
        images: [
          "images/heat_pump_1.jpg"
        ],
        manuals: [
          { href: "files/heatpump.pdf", label: "User Manual" },
          { href: "files/heatpump_2.pdf", label: "Spec Sheet" }
        ]
      },

      {
        title: "Wifi",
        description: "SSID: Himmelbå<br>Password: RubixCube2338",
        images: null,
        manuals: null
      },

      {
        title: "Electricity",
        description: "Nettlie> Klive<br>Str;mavtale> cheapenergy.no",
        images: null,
        manuals: null
      },

      {
        title: "Roof",
        description: "Ca. 150 kvm",
        images: null,
        manuals: null
      }



      
    ];

    const cardsEl = document.getElementById("cards");

    function renderCards() {
      cardsEl.innerHTML = "";

      const sortedEntries = [...entries].sort((a, b) =>
        a.title.localeCompare(b.title, undefined, { sensitivity: "base" })
      );

      if (!sortedEntries.length) {
        cardsEl.innerHTML = '<div class="empty-note">No specifications or manuals added yet.</div>';
        return;
      }

      sortedEntries.forEach(entry => {
        const card = document.createElement("article");
        card.className = "card";

        const title = document.createElement("h2");
        title.className = "card-title";
        title.textContent = entry.title;
        card.appendChild(title);

        const desc = document.createElement("p");
        desc.className = "card-desc";
        desc.innerHTML = entry.description || "";
        card.appendChild(desc);

        if (entry.images && entry.images.length) {
          const gallery = document.createElement("div");
          gallery.className = "image-gallery";

          entry.images.forEach(src => {
            const img = document.createElement("img");
            img.className = "card-image";
            img.src = src;
            img.alt = entry.title;
            img.addEventListener("click", () => {
              window.open(src, "_blank");
            });
            gallery.appendChild(img);
          });

          card.appendChild(gallery);
        }

        if (entry.manuals && entry.manuals.length) {
          const linksWrap = document.createElement("div");
          linksWrap.className = "manual-links";

          entry.manuals.forEach(manual => {
            if (!manual.href) return;

            const link = document.createElement("a");
            link.className = "manual-link";
            link.href = manual.href;
            link.textContent = manual.label || "Manual";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            linksWrap.appendChild(link);
          });

          if (linksWrap.children.length) {
            card.appendChild(linksWrap);
          }
        }

        cardsEl.appendChild(card);
      });
    }

    function applyTheme() {
      const hour = new Date().getHours();
      const theme = (hour >= 19 || hour < 7) ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", theme);

      const logoPath = theme === "dark" ? "logo-night.png" : "logo.png";

      const mainLogo = document.getElementById("main-logo");
      const favicon = document.getElementById("favicon-icon");
      const appleTouchIcon = document.getElementById("apple-touch-icon");

      if (mainLogo) mainLogo.src = logoPath;
      if (favicon) favicon.href = logoPath;
      if (appleTouchIcon) appleTouchIcon.href = logoPath;
    }

    renderCards();
    applyTheme();
    setInterval(applyTheme, 60000);
  </script>
</body>
</html>
