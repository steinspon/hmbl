<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Himmelblå – Contacts</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Himmelblå">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link id="apple-touch-icon" rel="apple-touch-icon" href="logo.png">
  <link id="favicon-icon" rel="icon" href="logo.png">

  <style>
    :root {
      --bg: #eef3f7;
      --card: rgba(255, 255, 255, 0.9);
      --text: #18324a;
      --muted: #58718a;
      --accent: #2c5f87;
      --accent-2: #6fa8dc;
      --border: rgba(44, 95, 135, 0.12);
      --shadow: 0 10px 30px rgba(24, 50, 74, 0.10);
      --radius: 20px;

      --bg-top: rgba(111,168,220,0.18);
      --bg-grad-top: #f7fbff;
      --bg-grad-bottom: var(--bg);

      --logo-wrap-bg: rgba(255,255,255,0.65);
      --logo-wrap-border: rgba(255,255,255,0.65);

      --btn-sms-bg-top: #ffffff;
      --btn-sms-bg-bottom: #eef4f8;
      --btn-sms-border: rgba(44,95,135,0.18);

      --back-bg: rgba(255,255,255,0.8);
      --back-border: rgba(44,95,135,0.14);
    }

    html[data-theme="dark"] {
      --bg: #0a1220;
      --card: rgba(20,31,48,0.9);
      --text: #e7eef8;
      --muted: #9fb0c7;
      --accent: #6de3b0;
      --accent-2: #4eb7ff;
      --border: rgba(170,190,220,0.10);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);

      --bg-top: rgba(80,220,170,0.14);
      --bg-grad-top: #0f1b2b;
      --bg-grad-bottom: #09111d;

      --logo-wrap-bg: rgba(255,255,255,0.04);
      --logo-wrap-border: rgba(255,255,255,0.06);

      --btn-sms-bg-top: rgba(30,45,65,1);
      --btn-sms-bg-bottom: rgba(25,38,55,1);
      --btn-sms-border: rgba(109,227,176,0.15);

      --back-bg: rgba(255,255,255,0.04);
      --back-border: rgba(109,227,176,0.15);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, var(--bg-top), transparent 35%),
        linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bottom) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .header {
      margin-bottom: 18px;
    }

    .logo-wrap {
      background: var(--logo-wrap-bg);
      border: 1px solid var(--logo-wrap-border);
      border-radius: 24px;
      padding: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
    }

    .page-title {
      margin: 18px 4px 6px;
      font-size: 1.75rem;
      font-weight: 800;
      text-align: center;
    }

    .page-subtitle {
      margin: 0 10px 20px;
      text-align: center;
      color: var(--muted);
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .card-title { font-weight: 800; }
    .card-desc { color: var(--muted); }

    .contact-name { font-weight: 700; }
    .contact-number { font-weight: 600; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border-radius: 16px;
      min-height: 52px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(44, 95, 135, 0.14);
    }

    .btn-call {
      background: linear-gradient(180deg, #2f6f9f, #25577d);
      color: white;
    }

    .btn-sms {
      background: linear-gradient(180deg, var(--btn-sms-bg-top), var(--btn-sms-bg-bottom));
      color: var(--accent);
      border: 1px solid var(--btn-sms-border);
    }

    .back-link {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 52px;
      border-radius: 16px;
      background: var(--back-bg);
      color: var(--accent);
      border: 1px solid var(--back-border);
      box-shadow: var(--shadow);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <div class="logo-wrap">
        <img id="main-logo" src="logo.png" class="logo">
      </div>
      <h1 class="page-title">Contacts</h1>
      <p class="page-subtitle">Useful contacts for Himmelblå and Hummelfjell.</p>
    </header>

    <!-- CONTENT UNCHANGED -->

    <div class="back-row">
      <a class="back-link" href="index.html">Tilbake</a>
    </div>
  </main>

  <script>
    (function () {
      const DARK_START = 19;

      const logo = document.getElementById("main-logo");
      const favicon = document.getElementById("favicon-icon");
      const appleIcon = document.getElementById("apple-touch-icon");

      function getTheme() {
        const h = new Date().getHours();
        return (h >= 19 || h < 7) ? "dark" : "light";
      }

      function applyTheme() {
        const theme = getTheme();
        document.documentElement.setAttribute("data-theme", theme);

        const logoPath = theme === "dark" ? "logo-night.png" : "logo.png";

        if (logo) logo.src = logoPath;
        if (favicon) favicon.href = logoPath;
        if (appleIcon) appleIcon.href = logoPath;
      }

      applyTheme();
      setInterval(applyTheme, 60000);
    })();
  </script>
</body>
</html>
