<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Himmelblå Checklist</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Himmelblå">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link id="apple-touch-icon" rel="apple-touch-icon" href="logo.png">
<link id="favicon-icon" rel="icon" href="logo.png">

<style>
    :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #222;
        --muted: #5f6b7a;
        --primary: #1e3a5f;
        --primary-soft: #e8eef5;
        --success-bg: #d4edda;
        --success-text: #155724;
        --shadow: 0 2px 6px rgba(0,0,0,0.05);
        --radius: 12px;

        --modal-overlay: rgba(0,0,0,0.45);
        --modal-sheet-bg: white;
        --modal-shadow: 0 -8px 30px rgba(0,0,0,0.18);
    }

    html[data-theme="dark"] {
        --bg: #0b1320;
        --card: #172232;
        --text: #e8eef7;
        --muted: #a2b0c3;
        --primary: #6de3b0;
        --primary-soft: #223247;
        --success-bg: #1e4b2f;
        --success-text: #d8f3df;
        --shadow: 0 4px 12px rgba(0,0,0,0.22);

        --modal-overlay: rgba(0,0,0,0.62);
        --modal-sheet-bg: #172232;
        --modal-shadow: 0 -8px 30px rgba(0,0,0,0.38);
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
        max-width: 500px;
        margin: auto;
        padding: 10px;
    }

    .logo {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 10px;
        display: block;
    }

    h2 {
        margin-top: 20px;
        margin-bottom: 10px;
        font-size: 18px;
    }

    .item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        margin-bottom: 8px;
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        font-size: 16px;
    }

    .item input[type="checkbox"] {
        transform: scale(1.35);
        margin: 0;
        flex: 0 0 auto;
    }

    .item-label {
        flex: 1 1 auto;
        min-width: 0;
        line-height: 1.35;
    }

    .info-btn {
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 999px;
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .checked {
        background: var(--success-bg);
        color: var(--success-text);
    }

    .checked .info-btn {
        background: rgba(21, 87, 36, 0.12);
        color: var(--success-text);
    }

    html[data-theme="dark"] .checked .info-btn {
        background: rgba(216, 243, 223, 0.12);
        color: var(--success-text);
    }

    .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    button.main-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        background: var(--primary);
        color: white;
        cursor: pointer;
    }

    html[data-theme="dark"] button.main-btn {
        color: #0b1320;
        font-weight: 700;
    }

    .back-row {
        margin-top: 20px;
        margin-bottom: 10px;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 52px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 700;
        background: var(--primary);
        color: white;
        box-shadow: var(--shadow);
    }

    html[data-theme="dark"] .back-link {
        color: #0b1320;
    }

    .modal {
        position: fixed;
        inset: 0;
        background: var(--modal-overlay);
        display: none;
        align-items: flex-end;
        justify-content: center;
        z-index: 1000;
    }

    .modal.open {
        display: flex;
    }

    .modal-sheet {
        width: 100%;
        max-width: 560px;
        max-height: 85vh;
        overflow-y: auto;
        background: var(--modal-sheet-bg);
        border-radius: 18px 18px 0 0;
        padding: 18px;
        box-shadow: var(--modal-shadow);
    }

    .modal-title {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.2;
    }

    .modal-empty {
        color: var(--muted);
        font-style: italic;
        margin: 0;
    }

    .guide-block {
        margin-bottom: 14px;
    }

    .guide-step-title {
        margin: 0 0 6px;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
    }

    .guide-step-text {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
    }

    .guide-image {
        width: 100%;
        border-radius: 12px;
        display: block;
        box-shadow: var(--shadow);
    }

    .modal-close {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
    }

    html[data-theme="dark"] .modal-close {
        color: #0b1320;
    }
</style>
</head>

<body>

<div class="container">

    <img id="main-logo" src="logo.png" class="logo" alt="Himmelblå logo">

    <div class="controls">
        <button class="main-btn" onclick="resetList()">Reset</button>
        <button class="main-btn" onclick="checkAll()">All Done</button>
    </div>

    <div id="list"></div>

    <div class="back-row">
        <a class="back-link" href="index.html">Back</a>
    </div>

</div>

<div id="guideModal" class="modal" onclick="closeGuide(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <h3 id="modalTitle" class="modal-title"></h3>
        <div id="modalGuideContent"></div>
        <p id="modalEmpty" class="modal-empty" style="display:none;">No guide added for this item yet.</p>
        <button class="modal-close" onclick="closeGuide()">Close</button>
    </div>
</div>

const container = document.getElementById("list");

let audioCtx = null;

function playSound() {
    try {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === "suspended") {
            audioCtx.resume();
        }

        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(1200, now);

        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.12);
    } catch (err) {
        console.error("Sound playback failed:", err);
    }
}

function saveState() {
    const states = [];
    document.querySelectorAll('.item input[type="checkbox"]').forEach(i => states.push(i.checked));
    localStorage.setItem("checklist", JSON.stringify(states));
}

function loadState() {
    const states = JSON.parse(localStorage.getItem("checklist") || "[]");
    document.querySelectorAll('.item input[type="checkbox"]').forEach((i, idx) => {
        if (states[idx]) {
            i.checked = true;
            i.closest(".item").classList.add("checked");
        }
    });
}

function openGuide(item) {
    const modal = document.getElementById("guideModal");
    const title = document.getElementById("modalTitle");
    const content = document.getElementById("modalGuideContent");
    const empty = document.getElementById("modalEmpty");

    title.textContent = item.label;
    content.innerHTML = "";

    const blocks = item.guide?.blocks || [];

    if (!blocks.length) {
        empty.style.display = "block";
    } else {
        empty.style.display = "none";

        blocks.forEach(block => {
            const wrapper = document.createElement("div");
            wrapper.className = "guide-block";

            if (block.type === "text") {
                if (block.title) {
                    const h = document.createElement("h4");
                    h.className = "guide-step-title";
                    h.textContent = block.title;
                    wrapper.appendChild(h);
                }

                const p = document.createElement("p");
                p.className = "guide-step-text";
                p.textContent = block.text || "";
                wrapper.appendChild(p);
            }

            if (block.type === "image") {
                const img = document.createElement("img");
                img.src = block.src;
                img.alt = block.alt || "";
                img.className = "guide-image";
                wrapper.appendChild(img);
            }

            content.appendChild(wrapper);
        });
    }

    modal.classList.add("open");
}

function closeGuide(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById("guideModal").classList.remove("open");
}

function createList() {
    data.forEach(section => {
        const title = document.createElement("h2");
        title.textContent = section.section;
        container.appendChild(title);

        section.items.forEach(item => {
            const row = document.createElement("div");
            row.className = "item";

            const input = document.createElement("input");
            input.type = "checkbox";

            input.addEventListener("change", () => {
                if (input.checked) {
                    row.classList.add("checked");
                    playSound();
                } else {
                    row.classList.remove("checked");
                }
                saveState();
            });

            const label = document.createElement("div");
            label.className = "item-label";
            label.textContent = item.label;

            const infoBtn = document.createElement("button");
            infoBtn.className = "info-btn";
            infoBtn.type = "button";
            infoBtn.setAttribute("aria-label", `Guide for ${item.label}`);
            infoBtn.textContent = "i";
            infoBtn.addEventListener("click", () => openGuide(item));

            row.appendChild(input);
            row.appendChild(label);
            row.appendChild(infoBtn);
            container.appendChild(row);
        });
    });

    loadState();
}

function resetList() {
    localStorage.removeItem("checklist");
    location.reload();
}

function checkAll() {
    document.querySelectorAll('.item input[type="checkbox"]').forEach(i => {
        i.checked = true;
        i.closest(".item").classList.add("checked");
    });
    saveState();
}

function applyTheme() {
    const hour = new Date().getHours();
    const theme = (hour >= 19 || hour < 7) ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);

    const logoPath = theme === "dark" ? "logo-night.png" : "logo.png";

    const mainLogo = document.getElementById("main-logo");
    const favicon = document.getElementById("favicon-icon");
    const appleTouchIcon = document.getElementById("apple-touch-icon");

    if (mainLogo) mainLogo.src = logoPath;
    if (favicon) favicon.href = logoPath;
    if (appleTouchIcon) appleTouchIcon.href = logoPath;
}

createList();
applyTheme();
setInterval(applyTheme, 60000);
