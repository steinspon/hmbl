<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Himmelblå Checklist</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f4f6f8;
        color: #222;
    }

    .container {
        max-width: 500px;
        margin: auto;
        padding: 10px;
    }

    .logo {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 10px;
    }

    h2 {
        margin-top: 20px;
        margin-bottom: 10px;
        font-size: 18px;
    }

    .item {
        display: flex;
        align-items: center;
        padding: 14px;
        margin-bottom: 8px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        font-size: 16px;
    }

    .item input {
        transform: scale(1.4);
        margin-right: 14px;
    }

    .checked {
        background: #d4edda;
        color: #155724;
    }

    .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        background: #1e3a5f;
        color: white;
    }

    .back-row {
        margin-top: 20px;
        margin-bottom: 10px;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 52px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 700;
        background: #1e3a5f;
        color: white;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
</style>
</head>

<body>

<div class="container">

    <!-- Logo -->
    <img src="logo.png" class="logo">

    <!-- Controls -->
    <div class="controls">
        <button onclick="resetList()">Reset</button>
        <button onclick="checkAll()">All Done</button>
    </div>

    <!-- Checklist -->
    <div id="list"></div>

    <!-- Back Button -->
    <div class="back-row">
        <a class="back-link" href="index.html">Tilbake</a>
    </div>

</div>

<script>
const data = [
    ["Bathroom",
        "Water shut off valve OFF",
        "Bathroom floor heating 20˚C",
        "Windows CLOSED",
        "Tap OPEN"
    ],
    ["Kitchen and Livingroom",
        "Living room floor heating OFF",
        "Sink valve OFF",
        "Tap OPEN",
        "Dishwasher OFF",
        "Dishwasher OPEN",
        "Heat pump mode: HEATING",
        "Heat pump temperature 17˚C",
        "Mill heat living room 15˚C",
        "Kids bedroom heater PLUGGED IN & ON",
        "All lights stue OFF",
        "Kitchen bin EMPTIED",
        "Balcony LOCKED",
        "Nothing plugged into chargers living room",
        "Fireplace READY"
    ],
    ["Bod",
        "Bod batter charger OFF",
        "Back door LOCKED",
        "WiFi repeater ON"
    ],
    ["Hallway",
        "Front door light ON",
        "Wall lights OFF",
        "Under floor heating 20 DEG",
        "Front door LOCKED",
        "Cameras set AWAY MODE"
    ]
];

const container = document.getElementById("list");

function playSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.type = "sine";
    o.frequency.value = 1200;

    o.connect(g);
    g.connect(ctx.destination);

    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
}

function saveState() {
    const states = [];
    document.querySelectorAll("input").forEach(i => states.push(i.checked));
    localStorage.setItem("checklist", JSON.stringify(states));
}

function loadState() {
    const states = JSON.parse(localStorage.getItem("checklist") || "[]");
    document.querySelectorAll("input").forEach((i, idx) => {
        if (states[idx]) {
            i.checked = true;
            i.parentElement.classList.add("checked");
        }
    });
}

function createList() {
    data.forEach(section => {
        const title = document.createElement("h2");
        title.innerText = section[0];
        container.appendChild(title);

        section.slice(1).forEach(item => {
            const div = document.createElement("div");
            div.className = "item";

            const input = document.createElement("input");
            input.type = "checkbox";

            input.addEventListener("change", () => {
                if (input.checked) {
                    div.classList.add("checked");
                    playSound();
                } else {
                    div.classList.remove("checked");
                }
                saveState();
            });

            div.appendChild(input);
            div.appendChild(document.createTextNode(item));
            container.appendChild(div);
        });
    });

    loadState();
}

function resetList() {
    localStorage.removeItem("checklist");
    location.reload();
}

function checkAll() {
    document.querySelectorAll("input").forEach(i => {
        i.checked = true;
        i.parentElement.classList.add("checked");
    });
    saveState();
}

createList();
</script>

</body>
</html>
