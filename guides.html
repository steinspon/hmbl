<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Himmelblå – Guides</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Himmelblå">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link id="apple-touch-icon" rel="apple-touch-icon" href="logo.png">
  <link id="favicon-icon" rel="icon" href="logo.png">

  <style>
    :root {
      --bg: #eef3f7;
      --card: rgba(255, 255, 255, 0.9);
      --text: #18324a;
      --muted: #58718a;
      --accent: #2c5f87;
      --accent-2: #6fa8dc;
      --border: rgba(44, 95, 135, 0.12);
      --shadow: 0 10px 30px rgba(24, 50, 74, 0.10);
      --radius: 20px;

      --bg-top: rgba(111, 168, 220, 0.18);
      --bg-grad-top: #f7fbff;
      --bg-grad-bottom: var(--bg);

      --logo-wrap-bg: rgba(255,255,255,0.65);
      --logo-wrap-border: rgba(255,255,255,0.65);

      --back-bg: rgba(255,255,255,0.8);
      --back-border: rgba(44, 95, 135, 0.14);

      --card-hover-border: rgba(44, 95, 135, 0.20);
      --card-hover-shadow: 0 14px 34px rgba(24, 50, 74, 0.14);
    }

    html[data-theme="dark"] {
      --bg: #0a1220;
      --card: rgba(20, 31, 48, 0.9);
      --text: #e7eef8;
      --muted: #9fb0c7;
      --accent: #6de3b0;
      --accent-2: #4eb7ff;
      --border: rgba(170, 190, 220, 0.10);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);

      --bg-top: rgba(80, 220, 170, 0.14);
      --bg-grad-top: #0f1b2b;
      --bg-grad-bottom: #09111d;

      --logo-wrap-bg: rgba(255,255,255,0.04);
      --logo-wrap-border: rgba(255,255,255,0.06);

      --back-bg: rgba(255,255,255,0.04);
      --back-border: rgba(109, 227, 176, 0.15);

      --card-hover-border: rgba(109, 227, 176, 0.20);
      --card-hover-shadow: 0 14px 34px rgba(0,0,0,0.34);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, var(--bg-top), transparent 35%),
        linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bottom) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .header {
      margin-bottom: 18px;
    }

    .logo-wrap {
      background: var(--logo-wrap-bg);
      border: 1px solid var(--logo-wrap-border);
      border-radius: 24px;
      padding: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
    }

    .page-title {
      margin: 18px 4px 6px;
      font-size: 1.75rem;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .page-subtitle {
      margin: 0 10px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.35;
    }

    .guide-list {
      display: grid;
      gap: 14px;
    }

    .guide-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition:
        background 0.3s ease,
        border-color 0.3s ease,
        box-shadow 0.3s ease,
        transform 0.12s ease;
    }

    .guide-card:hover {
      border-color: var(--card-hover-border);
      box-shadow: var(--card-hover-shadow);
      transform: translateY(-1px);
    }

    .guide-card:active {
      transform: scale(0.99);
    }

    .guide-title {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .guide-desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .empty-note {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .back-row {
      margin-top: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      background: var(--back-bg);
      color: var(--accent);
      border: 1px solid var(--back-border);
      box-shadow: var(--shadow);
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    @media (min-width: 700px) {
      .guide-list {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="logo-wrap">
        <img id="main-logo" src="logo.png" alt="Himmelblå logo" class="logo">
      </div>
      <h1 class="page-title">Guides</h1>
      <p class="page-subtitle">
        Step-by-step guides for anything and everything at Himmelblå.
      </p>
    </header>

    <section id="guide-list" class="guide-list"></section>

    <div class="back-row">
      <a class="back-link" href="index.html">Back</a>
    </div>
  </main>

  <script>
    const guides = [
      {
        title: "Sauna Shutoff Guide",
        description: "How to confirm that the sauna is fully shut down before leaving the cabin.",
        href: "guidetemp.html"
      },
      {
        title: "Bathroom Water Shutoff Guide",
        description: "How to locate and close the bathroom water shutoff valve safely.",
        href: "guidetemp.html"
      },
      {
        title: "Dishwasher Leave-Open Guide",
        description: "How to leave the dishwasher correctly after use to reduce moisture and odour.",
        href: "guidetemp.html"
      },
      {
        title: "Fireplace Ready Guide",
        description: "How to leave the fireplace safe, tidy, and ready for the next arrival.",
        href: "guidetemp.html"
      }
    ];

    const guideListEl = document.getElementById("guide-list");

    function renderGuides() {
      guideListEl.innerHTML = "";

      const sortedGuides = [...guides].sort((a, b) =>
        a.title.localeCompare(b.title, undefined, { sensitivity: "base" })
      );

      if (!sortedGuides.length) {
        guideListEl.innerHTML = '<div class="empty-note">No guides added yet.</div>';
        return;
      }

      sortedGuides.forEach(guide => {
        if (!guide.href) return;

        const card = document.createElement("a");
        card.className = "guide-card";
        card.href = guide.href;

        const title = document.createElement("h2");
        title.className = "guide-title";
        title.textContent = guide.title;
        card.appendChild(title);

        const desc = document.createElement("p");
        desc.className = "guide-desc";
        desc.textContent = guide.description || "";
        card.appendChild(desc);

        guideListEl.appendChild(card);
      });

      if (!guideListEl.children.length) {
        guideListEl.innerHTML = '<div class="empty-note">No guides added yet.</div>';
      }
    }

    function applyTheme() {
      const hour = new Date().getHours();
      const theme = (hour >= 19 || hour < 7) ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", theme);

      const logoPath = theme === "dark" ? "logo-night.png" : "logo.png";

      const mainLogo = document.getElementById("main-logo");
      const favicon = document.getElementById("favicon-icon");
      const appleTouchIcon = document.getElementById("apple-touch-icon");

      if (mainLogo) mainLogo.src = logoPath;
      if (favicon) favicon.href = logoPath;
      if (appleTouchIcon) appleTouchIcon.href = logoPath;
    }

    renderGuides();
    applyTheme();
    setInterval(applyTheme, 60000);
  </script>
</body>
</html>
